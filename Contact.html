<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact – Cosimo Mantovani</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b0b0b;
--text:#f5f5f5;
--muted:#b3b3b3;
--line:rgba(255,255,255,.12);
--card:#151515;
--max:1400px;
--pad:clamp(20px,2vw,36px);
--radius:18px;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Inter","Helvetica Neue",Arial,sans-serif;
background:var(--bg);
color:var(--text);
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
text-rendering:optimizeLegibility;
}

a{
color:inherit;
text-decoration:none;
}

.wrap{
width:min(calc(100% - 40px),var(--max));
margin:auto;
}

.contact-page{
min-height:100vh;
display:flex;
align-items:center;
padding:80px 0;
}

.contact-grid{
display:grid;
grid-template-columns:340px minmax(0,760px);
gap:72px;
align-items:start;
}

.contact-photo{
width:100%;
aspect-ratio:4/5;
border-radius:var(--radius);
overflow:hidden;
background:var(--card);
border:1px solid var(--line);
}

.contact-photo img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.contact-content{
padding-top:4px;
}

.contact-name{
margin:0;
font-size:clamp(42px,6vw,88px);
line-height:.92;
letter-spacing:-.06em;
font-weight:500;
}

.contact-divider{
width:140px;
height:1px;
background:var(--line);
margin:28px 0 36px;
}

.contact-links{
display:grid;
gap:18px;
max-width:360px;
}

.contact-link{
display:flex;
justify-content:space-between;
align-items:center;
padding-bottom:8px;
border-bottom:1px solid var(--line);
font-size:15px;
color:var(--muted);
transition:color .25s ease;
}

.contact-link span{
font-size:12px;
letter-spacing:.12em;
text-transform:uppercase;
}

.contact-link:hover{
color:var(--text);
}

@media (max-width:980px){

.contact-grid{
grid-template-columns:1fr;
gap:32px;
}

.contact-photo{
max-width:340px;
}

}

</style>
</head>

<body>

<main class="contact-page">

<section class="wrap contact-grid">

<div class="contact-photo">
<img src="images/Cosimo.jpg" alt="Cosimo Mantovani">
</div>

<div class="contact-content">

<h1 class="contact-name">Cosimo Mantovani</h1>

<div class="contact-divider"></div>

<div class="contact-links">

<a class="contact-link" href="https://www.linkedin.com/in/cosimomantovani/" target="_blank">
<span>LinkedIn</span>
<div>cosimomantovani</div>
</a>

<a class="contact-link" href="https://www.instagram.com/cosimo_mantovani_designer/" target="_blank">
<span>Instagram</span>
<div>@cosimo_mantovani_designer</div>
</a>

<a class="contact-link" href="mailto:cosimomantovanidesigner@gmail.com">
<span>Email</span>
<div>cosimomantovanidesigner@gmail.com</div>
</a>

</div>

</div>

</section>

</main>

</body>
</html>
